version: '3.8'



services:
  neo4j:
    image: neo4j:5.23-community
    container_name: neo4j-DataStore
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    networks:
      - my_network


    # volumes:    # server side mount points
    #   - /home/valueaccel/neo4j/neo4j_data_v3/data:/data
    #   - /home/valueaccel/neo4j/neo4j_data_v3/logs:/logs
    #   - /home/valueaccel/neo4j/neo4j_data_v3/conf:/conf
    #   - /home/valueaccel/neo4j/neo4j_data_v3/plugins:/plugins
    #   - /home/valueaccel/neo4j/neo4j_data_v3/import:/import
    
    volumes:  # windows laptop side mount points
      - C:/Users/user/Desktop/neo4j_data_v2_backup-20260105T150945Z-1-001/neo4j_data_v2_backup/data:/data
      - C:/Users/user/Desktop/neo4j_data_v2_backup-20260105T150945Z-1-001/neo4j_data_v2_backup/logs:/logs
      - C:/Users/user/Desktop/neo4j_data_v2_backup-20260105T150945Z-1-001/neo4j_data_v2_backup/conf:/conf
      - C:/Users/user/Desktop/neo4j_data_v2_backup-20260105T150945Z-1-001/neo4j_data_v2_backup/plugins:/plugins
      - C:/Users/user/Desktop/neo4j_data_v2_backup-20260105T150945Z-1-001/neo4j_data_v2_backup/import:/import

    # volumes:  # mac side mount points
    #   - /Users/dimuth/Documents/chat_bot/getdeep_neo4j/neo4j_data_v2/data:/data
    #   - /Users/dimuth/Documents/chat_bot/getdeep_neo4j/neo4j_data_v2/logs:/logs
    #   - /Users/dimuth/Documents/chat_bot/getdeep_neo4j/neo4j_data_v2/conf:/conf
    #   - /Users/dimuth/Documents/chat_bot/getdeep_neo4j/neo4j_data_v2/plugins:/plugins
    #   - /Users/dimuth/Documents/chat_bot/getdeep_neo4j/neo4j_data_v2/import:/import


    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-change_me}
      - NEO4J_PLUGINS=["apoc", "genai"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*,genai.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*,genai.*
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=2G
      - NEO4J_dbms_memory_pagecache_size=1G
      - NEO4J_dbms_default__listen__address=0.0.0.0
      - NEO4J_server_config_strict__validation_enabled=false
    
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    # deploy:
    #   resources:
    #     limits:
    #       memory: 4g

  

  chatbot:
    image: dimuthsenz/getdeep:v3
    container_name: deep
    restart: unless-stopped
    init: true
    ports:
      - "8080:8080"
    networks:
      - my_network
    volumes:
      - ./.env:/home/GetDeep/src/.env:ro
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      - APP_ENV=production
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - JWT_SECRET=${JWT_SECRET:-change_me}
      - JWT_ALGORITHM=HS256
      - AGENT_SERVICE_DATABASE_URL=${AGENT_SERVICE_DATABASE_URL:-postgresql+psycopg2://vinvest:vinvest@postgres:5432/AGENT_SERVICE}
      - AGENT_SERVICE_PG_CONN_STRING=${AGENT_SERVICE_PG_CONN_STRING:-postgresql://vinvest:vinvest@postgres:5432/AGENT_SERVICE}
      - KB_POSTGRES_URL=${KB_POSTGRES_URL:-postgresql://vinvest:vinvest@postgres:5432/Financial_database}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-change_me}
      - ALPHA_VANTAGE_API_KEY=${ALPHA_VANTAGE_API_KEY:-}
      - ALPHA_VANTAGE_BASE_URL=https://www.alphavantage.co/query
      - CHROMA_DATA_BASE_AVAILABILITY=NO
      - GRAPH_DATA_BASE_AVAILABILITY=YES
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
    # Override the image CMD explicitly for clarity/consistency in production
    command: ["uvicorn", "run:app", "--host", "0.0.0.0", "--port", "8080", "--workers", "2", "--app-dir", "src"]
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    stop_grace_period: 30s
    # deploy:
    #   resources:
    #     limits:
    #       memory: 6g


  
networks:
  my_network:
    driver: bridge





